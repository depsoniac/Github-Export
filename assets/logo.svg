<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cd-acid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2ff7a"/>
      <stop offset="1" stop-color="#a8e414"/>
    </linearGradient>
    <linearGradient id="cd-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b3a4ff"/>
      <stop offset="1" stop-color="#7a63f2"/>
    </linearGradient>
    <filter id="cd-glow-a" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#c9ff3d" flood-opacity="0.45"/>
    </filter>
    <filter id="cd-glow-p" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#9a88ff" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Barra trasera (violeta) -->
  <g filter="url(#cd-glow-p)">
    <rect x="30" y="20" width="13" height="30" rx="4.5"
          transform="skewX(-18)" transform-origin="36 35"
          stroke="url(#cd-purple)" stroke-width="4.5"/>
  </g>
  <!-- Barra frontal (ácida) -->
  <g filter="url(#cd-glow-a)">
    <rect x="19" y="13" width="13" height="30" rx="4.5"
          transform="skewX(-18)" transform-origin="25 28"
          stroke="url(#cd-acid)" stroke-width="4.5"/>
  </g>
</svg>
