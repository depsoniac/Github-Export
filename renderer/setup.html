<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Instalar ClipDock</title>
<style>
  :root{
    --acid:#c9ff3d;
    --purple:#9a88ff;
    --text:#f4f2ec;
    --muted:#828b97;
  }
  html,body{
    margin:0;height:100%;overflow:hidden;
    background:transparent;
    font-family:Inter,"Segoe UI",Arial,sans-serif;
    -webkit-user-select:none;user-select:none;
    -webkit-font-smoothing:antialiased;
    color:var(--text);
  }
  .window{
    position:relative;
    width:100vw;height:100vh;
    border-radius:22px;
    overflow:hidden;
    background:linear-gradient(160deg,#101319 0%,#090b0f 60%,#0b0d12 100%);
    border:1px solid #262c37;
    box-shadow:0 40px 120px rgba(0,0,0,.7);
    display:flex;flex-direction:column;
    align-items:center;
  }
  /* blobs animados de fondo, estilo orbe de G Hub */
  .blob{
    position:absolute;border-radius:50%;
    filter:blur(70px);
    pointer-events:none;
  }
  .blob.a{
    width:420px;height:420px;
    background:radial-gradient(circle,rgba(154,136,255,.32),transparent 65%);
    left:-90px;top:-120px;
    animation:floatA 11s ease-in-out infinite alternate;
  }
  .blob.b{
    width:380px;height:380px;
    background:radial-gradient(circle,rgba(201,255,61,.2),transparent 65%);
    right:-70px;bottom:-140px;
    animation:floatB 13s ease-in-out infinite alternate;
  }
  @keyframes floatA{from{transform:translate(0,0) scale(1)}to{transform:translate(70px,50px) scale(1.15)}}
  @keyframes floatB{from{transform:translate(0,0) scale(1.1)}to{transform:translate(-60px,-40px) scale(.95)}}

  .drag{position:absolute;inset:0 60px auto 0;height:56px;-webkit-app-region:drag}
  .close{
    position:absolute;top:14px;right:14px;z-index:5;
    width:34px;height:34px;border:1px solid #2b323d;border-radius:10px;
    background:#12161cbb;color:#8d96a1;font-size:17px;line-height:1;
    display:grid;place-items:center;cursor:pointer;
    -webkit-app-region:no-drag;
  }
  .close:hover{color:#fff;border-color:#454f5d;background:#1a2028}

  .stage{
    position:relative;z-index:2;
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:0;width:100%;
    padding-top:12px;
  }

  /* rombo con anillo giratorio */
  .diamond-wrap{position:relative;width:230px;height:230px;display:grid;place-items:center}
  .ring{
    position:absolute;inset:-14px;
    border-radius:34px;
    transform:rotate(45deg);
    background:conic-gradient(from 0deg,transparent 12%,rgba(201,255,61,.5) 26%,transparent 40%,transparent 58%,rgba(154,136,255,.45) 74%,transparent 88%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    padding:2px;
    animation:spin 6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(405deg)}}
  .diamond{
    position:relative;
    width:196px;height:196px;
    transform:rotate(45deg);
    border-radius:26px;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 16%,rgba(201,255,61,.14),transparent 44%),
      radial-gradient(circle at 84% 86%,rgba(154,136,255,.18),transparent 48%),
      linear-gradient(150deg,#141821 0%,#0a0c10 60%);
    border:1px solid #2c333f;
    box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 44px rgba(201,255,61,.05) inset;
    animation:breathe 4.5s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 30px rgba(201,255,61,.04) inset}
    50%{box-shadow:0 24px 80px rgba(0,0,0,.65),0 0 60px rgba(201,255,61,.09) inset}
  }
  .diamond .inner{
    position:absolute;inset:0;
    transform:rotate(-45deg) scale(1.42);
    display:grid;place-items:center;
  }
  .logo{width:74px;height:74px}

  .name{margin-top:30px;font-size:34px;font-weight:680;letter-spacing:-.035em;line-height:1}
  .name b{color:var(--acid);font-weight:680}
  .version{margin-top:8px;font-size:10px;font-weight:800;letter-spacing:.26em;color:var(--muted);text-transform:uppercase}

  .meta{
    margin-top:26px;text-align:center;min-height:34px;
  }
  .meta .path{font-size:12px;color:#aab3bf}
  .meta .path b{color:var(--text);font-weight:600}
  .meta .disk{margin-top:5px;font-size:10.5px;color:#6d7480}

  .actions{margin-top:20px;height:96px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .install-btn{
    -webkit-app-region:no-drag;
    min-width:250px;height:48px;
    border:0;border-radius:12px;cursor:pointer;
    font:inherit;font-size:13px;font-weight:800;letter-spacing:.14em;
    color:#11140a;
    background:linear-gradient(160deg,#e2ff7a,var(--acid) 55%,#a8e414);
    box-shadow:0 12px 34px rgba(201,255,61,.22),0 1px 0 #ffffff36 inset;
    transition:transform .16s ease,box-shadow .16s ease,filter .16s ease;
  }
  .install-btn:hover{transform:translateY(-2px);box-shadow:0 16px 44px rgba(201,255,61,.3),0 1px 0 #ffffff40 inset}
  .install-btn:active{transform:translateY(0);filter:brightness(.94)}
  .install-btn:disabled{opacity:.55;pointer-events:none}
  .install-btn.secondary{
    background:#171c23;color:#dfe4dc;
    border:1px solid #38414d;
    box-shadow:none;
  }

  /* progreso */
  .progress-zone{width:380px;display:none;flex-direction:column;align-items:center;gap:11px}
  .bar{
    width:100%;height:5px;border-radius:99px;background:#1d222b;overflow:hidden;position:relative;
    box-shadow:0 0 0 1px #ffffff08 inset;
  }
  .bar i{
    position:absolute;inset:0 auto 0 0;width:0%;
    border-radius:99px;
    background:linear-gradient(90deg,var(--acid),#e2ff7a);
    box-shadow:0 0 16px rgba(201,255,61,.5);
    transition:width .25s ease;
  }
  .bar i::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    animation:shine 1.4s ease-in-out infinite;
  }
  @keyframes shine{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
  .progress-row{width:100%;display:flex;justify-content:space-between;align-items:baseline}
  .status{font-size:11.5px;color:#9aa4b0}
  .percent{font-size:13px;font-weight:800;color:var(--acid)}
  .error{display:none;max-width:420px;text-align:center;font-size:11.5px;color:#ff8d8d;line-height:1.5}

  .footer{
    position:relative;z-index:2;
    width:100%;padding:0 26px 18px;box-sizing:border-box;
    display:flex;justify-content:space-between;align-items:center;
    font-size:9.5px;letter-spacing:.14em;color:#565e6a;text-transform:uppercase;font-weight:800;
  }
</style>
</head>
<body>
  <div class="window">
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div class="drag"></div>
    <button class="close" id="close" aria-label="Cerrar">×</button>

    <div class="stage">
      <div class="diamond-wrap">
        <div class="ring"></div>
        <div class="diamond">
          <div class="inner">
            <svg class="logo" viewBox="0 0 64 64" fill="none" aria-hidden="true">
              <defs>
                <linearGradient id="st-acid" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#e2ff7a"/><stop offset="1" stop-color="#a8e414"/>
                </linearGradient>
                <linearGradient id="st-purple" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#b3a4ff"/><stop offset="1" stop-color="#7a63f2"/>
                </linearGradient>
                <filter id="st-glow-a" x="-60%" y="-60%" width="220%" height="220%">
                  <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#c9ff3d" flood-opacity="0.45"/>
                </filter>
                <filter id="st-glow-p" x="-60%" y="-60%" width="220%" height="220%">
                  <feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#9a88ff" flood-opacity="0.5"/>
                </filter>
              </defs>
              <g filter="url(#st-glow-p)">
                <rect x="30" y="20" width="13" height="30" rx="4.5" transform="skewX(-18)" transform-origin="36 35" stroke="url(#st-purple)" stroke-width="4.5"/>
              </g>
              <g filter="url(#st-glow-a)">
                <rect x="19" y="13" width="13" height="30" rx="4.5" transform="skewX(-18)" transform-origin="25 28" stroke="url(#st-acid)" stroke-width="4.5"/>
              </g>
            </svg>
          </div>
        </div>
      </div>

      <div class="name">Clip<b>Dock</b></div>
      <div class="version" id="version">VERSIÓN</div>

      <div class="meta">
        <div class="path" id="install-path">Leyendo destino…</div>
        <div class="disk" id="disk-info"></div>
      </div>

      <div class="actions">
        <button class="install-btn" id="install">INSTALAR</button>
        <div class="progress-zone" id="progress-zone">
          <div class="bar"><i id="bar-fill"></i></div>
          <div class="progress-row">
            <span class="status" id="status">Preparando…</span>
            <span class="percent" id="percent">0%</span>
          </div>
        </div>
        <div class="error" id="error"></div>
      </div>
    </div>

    <div class="footer">
      <span>Por Depson</span>
      <span>clipdock</span>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const btn = $('install');
    const zone = $('progress-zone');
    const fill = $('bar-fill');
    const statusEl = $('status');
    const percentEl = $('percent');
    const errorEl = $('error');
    let installed = false;

    function formatGB(bytes){
      if (!bytes) return '';
      return (bytes / (1024*1024*1024)).toFixed(bytes > 10*1024*1024*1024 ? 0 : 1) + ' GB';
    }
    function formatMB(bytes){
      return Math.max(1, Math.round(bytes / (1024*1024))) + ' MB';
    }

    const v = new URLSearchParams(location.search).get('v');
    if (v) $('version').textContent = 'VERSIÓN ' + v;

    async function loadInfo(){
      try{
        const info = await window.setupAPI.getInfo();
        $('install-path').innerHTML = (info.alreadyInstalled ? 'Se actualizará en ' : 'Se instalará en ') + '<b>' + info.targetDir + '</b>';
        const parts = [];
        if (info.sizeBytes) parts.push('Requiere ' + formatMB(info.sizeBytes));
        if (info.freeBytes) parts.push(formatGB(info.freeBytes) + ' disponibles en disco');
        $('disk-info').textContent = parts.join(' · ');
        if (info.alreadyInstalled) btn.textContent = 'ACTUALIZAR';
      }catch(e){
        $('install-path').textContent = 'No pude leer la información de instalación.';
      }
    }
    loadInfo();

    const phaseText = {
      copy: 'Copiando archivos…',
      shortcuts: 'Creando accesos directos…',
      registry: 'Registrando en Windows…',
      done: 'Instalación completa'
    };

    window.setupAPI.onProgress((p) => {
      if (typeof p.percent === 'number'){
        fill.style.width = p.percent + '%';
        percentEl.textContent = p.percent + '%';
      }
      statusEl.textContent = phaseText[p.phase] || 'Instalando…';
      if (p.phase === 'copy' && p.done && p.total){
        statusEl.textContent = 'Copiando archivos… (' + p.done + ' de ' + p.total + ')';
      }
    });

    btn.addEventListener('click', async () => {
      if (installed){
        btn.disabled = true;
        await window.setupAPI.launch();
        return;
      }
      errorEl.style.display = 'none';
      btn.style.display = 'none';
      zone.style.display = 'flex';
      statusEl.textContent = 'Preparando…';
      const result = await window.setupAPI.install();
      if (result && result.ok){
        installed = true;
        fill.style.width = '100%';
        percentEl.textContent = '100%';
        statusEl.textContent = 'Instalación completa';
        setTimeout(() => {
          zone.style.display = 'none';
          btn.textContent = 'ABRIR CLIPDOCK';
          btn.style.display = 'block';
        }, 650);
      } else {
        zone.style.display = 'none';
        btn.textContent = 'REINTENTAR';
        btn.style.display = 'block';
        errorEl.textContent = (result && result.error) || 'La instalación falló.';
        errorEl.style.display = 'block';
      }
    });

    $('close').addEventListener('click', () => window.setupAPI.close());
  </script>
</body>
</html>
